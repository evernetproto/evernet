server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
spring.datasource.url=jdbc:sqlite:${DATABASE_PATH:database.sqlite}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
evernet.vertex.endpoint=${EVERNET_VERTEX_ENDPOINT:localhost:8080}
evernet.vertex.identifier=${EVERNET_VERTEX_IDENTIFIER:vertex}
evernet.vertex.display-name=${EVERNET_VERTEX_DISPLAY_NAME:Vertex}
evernet.vertex.description=${EVERNET_VERTEX_DISPLAY_NAME:Vertex}
evernet.vertex.jwt-secret-key=${EVERNET_VERTEX_JWT_SECRET_KEY:secret.secret.secret.secret.secret.secret.secret.secret}
evernet.vertex.federation.protocol=${EVERNET_VERTEX_FEDERATION_PROTOCOL:http}
evernet.vertex.resttemplate.default.read-timeout=${EVERNET_VERTEX_RESTTEMPLATE_DEFAULT_READ_TIMEOUT:5000}
evernet.vertex.resttemplate.default.connect-timeout=${EVERNET_VERTEX_RESTTEMPLATE_DEFAULT_CONNECT_TIMEOUT:5000}